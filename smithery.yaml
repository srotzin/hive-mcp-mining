startCommand:
  type: http
  configSchema:
    type: object
    properties: {}
    required: []
  url: https://hive-mcp-mining.onrender.com/mcp

name: hive-mcp-mining
displayName: Tether MOS Telemetry + Boltz BTC↔USDC Atomic Swap Broker — Hive Civilization
version: "2.0.0"
description: >
  Tether MOS site telemetry (read-only) and Boltz BTC↔USDC atomic swap broker
  via the Hive Civilization. 5 doctrine-clean tools: MOS site queries, payout
  queries, Bitcoin fee intel, next-block forecast, and Boltz BTC→USDC reverse
  swap. Hive does NOT route hashrate. Hive does NOT custody BTC.
  USDC settlement on Base L2. Real rails.
  Reclass from hashrate routing per Hive supreme rules
  (precedent: hive-swarm-trader → hive-swarm-signal-relay).

author:
  name: Steve Rotzin
  email: steve@thehiveryiq.com
  url: https://www.thehiveryiq.com

license: MIT
homepage: https://hive-mcp-mining.onrender.com
repository:
  type: git
  url: https://github.com/srotzin/hive-mcp-mining

transport: streamable-http
endpoint: https://hive-mcp-mining.onrender.com/mcp
protocol: "2024-11-05"

categories:
  - bitcoin
  - tether
  - mos
  - boltz
  - atomic-swap
  - agent-to-agent
  - infrastructure
  - web3

tags:
  - mcp
  - tether
  - mos
  - boltz
  - atomic-swap
  - btc
  - usdc
  - x402
  - hive-civilization
  - read-only-telemetry

tools:
  - name: mos.query_sites
    description: Query Tether MOS operator sites and telemetry. Read-only. $0.001.
  - name: mos.query_payouts
    description: Get operator pending USDC payout balance. Read-only. $0.001.
  - name: bitcoin_fee_advice
    description: Bortlesboat BTC mempool fee landscape + nextblock candidate pool. $0.02.
  - name: next_block_forecast
    description: Next-block fee window forecast with Bortlesboat. $0.03.
  - name: payout_btc_to_usdc
    description: Boltz reverse swap BTC → USDC on Base. Atomic, no custody. 40bps spread.

runtime:
  type: node
  version: ">=18"
  command: node server.js
  env:
    - name: PORT
      default: "3000"
      required: false
    - name: HIVE_BASE
      default: "https://hivemorph.onrender.com"
      required: false
